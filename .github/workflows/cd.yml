name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Deploy
        run: echo "Deploying to staging server..."

      - name: Use secret
        run: echo "Secret is ${{ secrets.DEPLOY_KEY }}"